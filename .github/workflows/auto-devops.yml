name: Auto DevOps

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Stage 1: Lint & Type Check
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint
      
      - name: Type check
        run: npx tsc --noEmit

  # Stage 2: Build & Push Docker Image
  build:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
      commit_sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            latest
      
      - name: Get build info
        id: build_info
        run: |
          echo "commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
      
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            GIT_COMMIT=${{ steps.build_info.outputs.commit }}
            GIT_BRANCH=${{ steps.build_info.outputs.branch }}
            BUILD_TIME=${{ steps.build_info.outputs.time }}

  # Stage 3: Deploy to Production (only on main/master branch)
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment:
      name: production
      url: https://safehaven.thecoll.org
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || '22' }}
          script: |
            set -e
            echo "🚀 Starting deployment..."
            echo "📦 Deploying commit: ${{ github.sha }}"
            
            # Navigate to app directory
            cd /opt/the-haven
            
            # Pull latest docker-compose and entrypoint changes
            git fetch origin
            git reset --hard origin/main || git reset --hard origin/master
            
            # Login to GitHub Container Registry on server
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull the new image
            docker pull ${{ needs.build.outputs.image_tag }}
            
            # Update docker-compose to use the new image
            sed -i "s|build: .|image: ${{ needs.build.outputs.image_tag }}|" docker-compose.prod.yml
            
            # Store deployed commit info
            echo "${{ github.sha }}" > .deployed_commit
            
            # Ensure data directory exists with correct permissions
            mkdir -p data
            chmod 755 data
            
            # Stop and restart services
            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml up -d
            
            # Cleanup old images
            docker image prune -af --filter "until=168h" || true
            
            echo "✅ Deployment complete!"
            echo "📊 Container status:"
            docker-compose -f docker-compose.prod.yml ps
            
            echo ""
            echo "🔗 Version endpoint:"
            sleep 5
            curl -sf http://localhost:3000/api/version || echo "Version check failed"

  # Stage 4: Health Check (verify deployment)
  healthcheck:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Wait for deployment
        run: sleep 30
      
      - name: Check application health
        run: |
          echo "Checking health endpoint..."
          curl -sf https://safehaven.thecoll.org/api/health \
            --retry 5 --retry-delay 10 --retry-max-time 60 \
            || (echo "❌ Health check failed!" && exit 1)
          echo "✅ Health check passed!"
      
      - name: Check deployed version
        run: |
          echo "Checking deployed version..."
          VERSION=$(curl -sf https://safehaven.thecoll.org/api/version)
          echo "Deployed version: $VERSION"
          
          # Extract commit from version response
          DEPLOYED_COMMIT=$(echo "$VERSION" | grep -o '"commit":"[^"]*"' | cut -d'"' -f4)
          EXPECTED_COMMIT=$(echo "${{ github.sha }}" | cut -c1-7)
          
          if [ "$DEPLOYED_COMMIT" = "${{ github.sha }}" ] || [ "$DEPLOYED_COMMIT" = "$EXPECTED_COMMIT" ]; then
            echo "✅ Correct commit is deployed: $DEPLOYED_COMMIT"
          else
            echo "⚠️  Deployed commit ($DEPLOYED_COMMIT) doesn't match expected ($EXPECTED_COMMIT)"
            echo "   This may be due to caching - the new version may still be starting up"
          fi
